name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  embeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify HTML embeds match canonical scripts
        run: make verify
